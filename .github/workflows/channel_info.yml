name: Refresh Channel IDs

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write 

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to avoid conflicts

      - name: Configure Git
        run: |
          git config --global user.email "github-action@users.noreply.github.com"
          git config --global user.name "GitHub Action"

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate channel info
        env:
          YOUTUBE_API_KEY: ${{ secrets.KEY_API_GOOGLE_CLOUD }}
        run: python yt/scripts/channel_info.py

      - name: Commit and push changes
        run: |
          git add .
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "Updated channel info"
            git pull --rebase origin main
            git push
          fi

      - name: Clean up __pycache__
        run: find . -name '__pycache__' -exec rm -r {} +
